<!doctype html>
<!-- MilesVault-branded codelab template (forked from claat default). Light + dark. -->
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1.0, user-scalable=yes">
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#4d6e60" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#131417" media="(prefers-color-scheme: dark)">
  <title>{{.Meta.Title}} · MilesVault</title>
  <link rel="icon" href="../assets/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="//fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="{{.Prefix}}/claat-public/codelab-elements.css">
  <style>
    :root {
      color-scheme: light dark;
      --mv-accent: #4d6e60;
      --mv-accent-ink: #ffffff;
      --mv-page: #f5f5f2;
      --mv-card: #ffffff;
      --mv-header: #ffffff;
      --mv-text: #1c1c1c;
      --mv-muted: #5f5f5f;
      --mv-border: #e6e6e2;
      --mv-code-inline: #eef0ee;
      --mv-code-inline-text: #1c1c1c;
      --mv-special-bg: #e8f3ec;
      --mv-special-bd: #4d6e60;
      --mv-warning-bg: #fbf3df;
      --mv-warning-bd: #c8862b;
      /* Journal-editor theme, reused verbatim for code blocks */
      --cm-bg: #faf8f5;
      --cm-accent: #4d6e60;
      --cm-text: #2e2b27;
      --cm-muted: #8a8378;
      --cm-number: #8c5e3c;
      --cm-unit: #5b7185;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --mv-accent: #93b8a5;
        --mv-accent-ink: #10231b;
        --mv-page: #131417;
        --mv-card: #1c1e22;
        --mv-header: #191b1e;
        --mv-text: #e7e7e3;
        --mv-muted: #9a9a96;
        --mv-border: #2c2f34;
        --mv-code-inline: #2a2d33;
        --mv-code-inline-text: #e7e7e3;
        --mv-special-bg: #16241c;
        --mv-special-bd: #3f6b54;
        --mv-warning-bg: #2a2113;
        --mv-warning-bd: #9c7327;
        --cm-bg: #24221f;
        --cm-accent: #93b8a5;
        --cm-text: #e8e4dd;
        --cm-muted: #a39d92;
        --cm-number: #d2a275;
        --cm-unit: #93a8bb;
      }
    }

    html, body { background: var(--mv-page); }
    .success { color: #1e8e3e; }
    .error { color: #d93025; }

    /* Fonts everywhere */
    google-codelab, google-codelab #codelab-title, .instructions,
    google-codelab #drawer, google-codelab-step {
      font-family: 'Inter', system-ui, -apple-system, sans-serif !important;
    }
    google-codelab-step pre, google-codelab-step code {
      font-family: 'JetBrains Mono', ui-monospace, monospace !important;
    }

    /* Surfaces */
    google-codelab #main { background: var(--mv-page) !important; }
    google-codelab #drawer { background: var(--mv-page) !important; border-right: 1px solid var(--mv-border); }
    .instructions { background: var(--mv-card) !important; color: var(--mv-text) !important; border: 1px solid var(--mv-border); border-radius: 12px; }
    google-codelab-step .instructions h1,
    google-codelab-step .instructions h2,
    google-codelab-step .instructions h3,
    google-codelab-step .instructions p,
    google-codelab-step .instructions li { color: var(--mv-text) !important; }

    /* Header bar + logo */
    google-codelab #codelab-title {
      background: var(--mv-header) !important;
      color: var(--mv-text) !important;
      border-bottom: 1px solid var(--mv-border);
    }
    google-codelab #codelab-title::before {
      content: "";
      display: inline-block;
      width: 24px; height: 24px;
      margin: 0 10px 0 4px;
      flex: 0 0 auto;
      align-self: center;
      background: url("../assets/logo.svg") center/contain no-repeat;
    }
    google-codelab #codelab-title a { color: var(--mv-text) !important; }

    /* Step nav (left rail) */
    google-codelab #drawer ol li a { background: var(--mv-card) !important; color: var(--mv-muted) !important; border-color: var(--mv-border) !important; }
    google-codelab #drawer ol li[completed] a { color: var(--mv-text) !important; }
    google-codelab #drawer ol li[completed] .step:before { background-color: var(--mv-accent) !important; }
    google-codelab #drawer ol li[selected] a { border-color: var(--mv-accent) !important; }

    /* Buttons */
    google-codelab #next-step { background: var(--mv-accent) !important; color: var(--mv-accent-ink) !important; }
    google-codelab #previous-step, google-codelab #done { color: var(--mv-accent) !important; background: var(--mv-card) !important; }
    google-codelab-step .instructions paper-button.colored { background-color: var(--mv-accent) !important; color: var(--mv-accent-ink) !important; }

    /* Links */
    google-codelab-step .instructions a { color: var(--mv-accent) !important; }

    /* Inline code */
    google-codelab-step code { background-color: var(--mv-code-inline) !important; color: var(--mv-code-inline-text); }

    /* Callouts */
    google-codelab-step .instructions aside.special { background: var(--mv-special-bg) !important; border-color: var(--mv-special-bd) !important; color: var(--mv-text) !important; }
    google-codelab-step .instructions aside.warning { background: var(--mv-warning-bg) !important; border-color: var(--mv-warning-bd) !important; color: var(--mv-text) !important; }
    google-codelab-step .instructions aside b { color: inherit !important; }

    /* Code blocks: the Journal-editor surface + theme, wrapped (no h-scroll) */
    google-codelab-step pre {
      position: relative;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      padding: 16px 46px 16px 16px; /* room for the copy button */
      background: var(--cm-bg) !important;
      color: var(--cm-text) !important;
      border: 1px solid var(--mv-border);
      border-radius: 8px;
    }
    google-codelab-step pre > code { background: transparent !important; color: inherit !important; }
    /* Beancount tokens — same tag→colour mapping as the app's HighlightStyle */
    google-codelab-step pre .bc-date { color: var(--cm-accent); }
    google-codelab-step pre .bc-flag { color: var(--cm-text); font-weight: 700; }
    google-codelab-step pre .bc-string { color: var(--cm-muted); }
    google-codelab-step pre .bc-account { color: var(--cm-text); }
    google-codelab-step pre .bc-number { color: var(--cm-number); font-weight: 700; }
    google-codelab-step pre .bc-currency { color: var(--cm-unit); }
    google-codelab-step pre .bc-comment { color: var(--cm-muted); font-style: italic; }
    /* Fallback: if the highlighter doesn't run, keep prettify's near-white tokens readable */
    google-codelab-step pre .pln, google-codelab-step pre .pun { color: var(--cm-text) !important; }

    /* Permanent copy icon button (sits on the code surface) */
    .mv-copy {
      position: absolute; top: 8px; right: 8px;
      width: 30px; height: 30px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 6px; cursor: pointer;
      background: transparent; color: var(--cm-muted);
      border: 1px solid var(--mv-border);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .mv-copy:hover { color: var(--cm-text); border-color: var(--cm-muted); }
    .mv-copy.copied { background: var(--mv-accent); border-color: var(--mv-accent); color: var(--mv-accent-ink); }
    .mv-copy svg { width: 15px; height: 15px; display: block; }
  </style>
</head>
<body>
  <google-codelab-analytics gaid="{{.GlobalGA}}" ga4id="{{.GlobalGA4}}"></google-codelab-analytics>
  <google-codelab codelab-gaid="{{.Meta.GA}}"
                  codelab-ga4id="{{.Meta.GA4}}"
                  id="{{.Meta.ID}}"
                  title="{{.Meta.Title}}"
                  environment="{{index .Env}}"
                  feedback-link="{{.Meta.Feedback}}">
    {{range $i, $e := .Steps}}{{if matchEnv .Tags $.Env}}
      <google-codelab-step label="{{.Title}}" duration="{{.Duration.Minutes}}">
        {{.Content | renderHTML $.Context}}
      </google-codelab-step>
    {{end}}{{end}}
  </google-codelab>

  <script src="{{.Prefix}}/claat-public/native-shim.js"></script>
  <script src="{{.Prefix}}/claat-public/custom-elements.min.js"></script>
  <script src="{{.Prefix}}/claat-public/prettify.js"></script>
  <script src="{{.Prefix}}/claat-public/codelab-elements.js"></script>
  <script src="../assets/beancount-hl.js"></script>

  <script>
    // Add a permanent Copy icon button to every code block.
    window.addEventListener('load', function () {
      var COPY = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
      var DONE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>';
      function addCopyButtons() {
        document.querySelectorAll('google-codelab-step pre').forEach(function (pre) {
          if (pre.querySelector('.mv-copy')) return;
          var code = pre.querySelector('code') || pre;
          var raw = code.innerText.replace(/\s+$/, '');
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'mv-copy';
          btn.title = 'Copy';
          btn.setAttribute('aria-label', 'Copy');
          btn.innerHTML = COPY;
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            navigator.clipboard.writeText(raw).then(function () {
              btn.innerHTML = DONE;
              btn.title = 'Copied';
              btn.classList.add('copied');
              setTimeout(function () { btn.innerHTML = COPY; btn.title = 'Copy'; btn.classList.remove('copied'); }, 1500);
            });
          });
          pre.appendChild(btn);
        });
      }
      addCopyButtons();
      setTimeout(addCopyButtons, 800); // catch any late hydration

      // The close (X) and the final Done button default to the site root ("/"),
      // which bounces signed-in users to /vault. Send them to the Learn home
      // (../ resolves /learn/<id>/ -> /learn/) instead.
      document.addEventListener('click', function (e) {
        var t = e.target.closest && e.target.closest('#done, #arrow-back');
        if (t) { e.preventDefault(); e.stopPropagation(); window.location.assign('../'); }
      }, true);
    });
  </script>
</body>
</html>
