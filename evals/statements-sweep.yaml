# Statements-sweep — multi-transaction statement-ingest eval. Each case pastes a
# whole synthetic statement (mirroring a real issuer's LAYOUT and edge cases, but
# with invented issuers / merchants / amounts / dates — see CLAUDE.md) and grades
# the drafted batch. Purpose: exercise the agentic draft loop on a LONG statement
# (the reliability concern when statement ingest moved onto the editor agent) and
# pin the per-layout quirks: ₹-as-"C" glyph, Dr/CR suffixes, a reward column,
# cashback posted as a credit, finance charges + tax, a returned payment, and a
# forex markup fee.
#
# Runs the DEDICATED statement-ingest path on staging — /api/test/ingest, which
# drives the SAME ChatDO.runDraftStatement the upload/Inbox flow uses (NOT the
# editor turn; statement ingest is its own path, the editor's in-chat handling is
# UI-only). Structural asserts + judge (same judge as promptfooconfig.yaml).
# Run:  pnpm eval -- -c evals/statements-sweep.yaml   (needs TEST_USER_TOKEN)

description: MilesVault statements-sweep (multi-txn ingest)

prompts:
  - '{{message}}'

providers:
  - id: 'https://staging.milesvault.com/api/test/ingest'
    label: ingest
    config:
      method: POST
      headers:
        'Content-Type': 'application/json'
        'cookie': 'mv-test-token={{env.TEST_USER_TOKEN}}'
      body:
        # The dedicated path stores the statement blob then drafts off it — the
        # statement text goes in `text` (not an editor `message`).
        text: '{{message}}'
        seed: '{{seed}}'
        filename: 'statement.txt'
      transformResponse: 'json'

defaultTest:
  options:
    provider:
      id: 'https://staging.milesvault.com/api/test/judge'
      config:
        method: POST
        headers:
          'Content-Type': 'application/json'
          'cookie': 'mv-test-token={{env.TEST_USER_TOKEN}}'
        body:
          prompt: '{{prompt}}'
        transformResponse: 'json.output'
  assert:
    # Global guard: gemma tool-call tokens must never leak into the text channel.
    - type: javascript
      value: "!String(output.text || '').includes('tool_call')"
      metric: no-garble
    # The whole batch must parse + balance per currency.
    - type: javascript
      value: 'output.draftsValid === true'
      metric: balances
    # Every ingest bookends with pad + balance (the closing reconciliation that
    # catches a misread row): at least one pad and one balance directive, landing
    # the printed closing figures the statements include below.
    - type: javascript
      value: "(output.drafts||[]).some(d=>/\\bpad\\b/.test(d.text||'')) && (output.drafts||[]).some(d=>/\\bbalance\\b/.test(d.text||''))"
      metric: pad-balance-bookends

tests:
  # ---- A: points card, reward column, ₹-as-"C" glyph, membership fee + tax,
  #         autopay credit (= payment, not a spend). HDFC-Infinia-shaped. ----
  - description: 'statement — points card, long batch, fee+tax+autopay-credit'
    vars:
      seed: |
        2026-01-02 * "Zenith" "Welcome points"
          Assets:Rewards:Points:Zenith   1000 ZENPTS
          Equity:Void                   -1000 ZENPTS

        2026-01-03 * "Corner Store" "Setup"
          Expenses:Misc                           100 INR
          Liabilities:CreditCards:Zenith:Rewards -100 INR
      message: |
        add everything from my Zenith credit card statement:

        Zenith Credit Card Statement — Statement Date 16 Mar 2026
        Domestic Transactions
        DATE & TIME            TRANSACTION DESCRIPTION                 REWARDS      AMOUNT       PI
        14/02/2026| 10:12      VOUCHERHUB VIA SMARTDEALS NEW DELHI     + 600        C 18,000.00  l
        14/02/2026| 10:20      VOUCHERHUB VIA SMARTDEALS NEW DELHI     + 600        C 18,000.00  l
        16/02/2026| 13:31      GREENLEAF SUPERMART BENGALURU           + 40         C 1,240.00   l
        18/02/2026| 19:40      OLIVE BISTRO BENGALURU                  + 130        C 3,950.00   l
        21/02/2026| 09:05      METRO FUEL STOP BENGALURU               + 20         C 2,000.00   l
        25/02/2026| 21:14      CINELAND MULTIPLEX                      + 35         C 1,050.00   l
        28/02/2026| 00:00      RENEWAL MEMBERSHIP FEE                               C 12,500.00  l
        28/02/2026| 00:00      IGST-RATE 18.0                                       C 2,250.00   l
        05/03/2026| 08:43      AUTOPAY THANK YOU                       + C 41,800.00             l
        07/03/2026| 12:48      VOUCHERHUB SMARTDEALS NEW DELHI         + 50         C 1,500.00   l
        10/03/2026| 18:22      BRIGHTMART PHARMACY                     + 15         C 480.00     l
        Reward Points — Opening 1,000 · Earned this cycle 2,055 · Closing Balance 3,055
        Total Amount Due  C 58,420.00
    assert:
      - type: javascript
        value: 'output.drafts.length >= 8 && output.clarifies.length === 0'
        metric: captured-most
      - type: javascript
        value: "output.drafts.some(d => d.text.includes('Liabilities:CreditCards:Zenith'))"
        metric: card-leg
      # No card_guide for a fictional issuer, so the model improvises the currency
      # name — assert it accrues SOME reward leg, not an exact ticker.
      - type: javascript
        value: "output.drafts.some(d => /Assets:Rewards/.test(d.text))"
        metric: reward-leg
      # The autopay credit is a payment, not a spend — no Expenses leg for it.
      - type: javascript
        value: "!output.drafts.some(d => /Expenses\\S*\\s+-?41[,.]?800/.test(d.text))"
        metric: autopay-not-expense
      - type: llm-rubric
        value: |
          The drafts ingest a points credit-card statement. Each PURCHASE posts to
          Liabilities:CreditCards:Zenith… and accrues the stated reward points (the
          "+N" reward column) into the ZENPTS pool. The RENEWAL MEMBERSHIP FEE and
          the IGST line are expenses (a fee + a tax), NOT reward-earning purchases.
          The "AUTOPAY THANK YOU + C 41,800.00" line is a PAYMENT that reduces the
          card balance — it is NOT an expense and earns no points. Amounts written
          "C 18,000.00" are ₹18,000 (the glyph is the rupee sign). PASS only if the
          purchases, the fee, the tax, and the payment are all handled this way.

  # ---- B: cashback card — cashback posted as a CREDIT, finance charges + tax,
  #         and a RETURNED payment (reversal). Swiggy-HDFC-shaped. ----
  - description: 'statement — cashback card, cashback-credit, finance charge, returned payment'
    vars:
      seed: |
        2026-01-03 * "Corner Store" "Setup"
          Expenses:Misc                           100 INR
          Liabilities:CreditCards:Munch:Cashback -100 INR
      message: |
        add everything from my Munch cashback card statement:

        Munch Cashback Credit Card Statement — Statement Date 23 Apr 2026
        DATE & TIME            TRANSACTION DESCRIPTION              AMOUNT       PI
        25/03/2026| 13:10      QUICKBITE FOOD DELIVERY              C 1,540.00   l
        28/03/2026| 20:02      QUICKBITE FOOD DELIVERY              C 925.50     l
        30/03/2026| 11:30      DAILYMART HYPERMARKET                C 2,310.00   l
        02/04/2026| 09:18      10% MUNCH CASHBACK                   + C 246.50   l
        06/04/2026| 14:44      FETCHFAST GROCERIES                  C 689.00     l
        12/04/2026| 00:00      AUTOPAY THANK YOU                    + C 5,797.00 l
        12/04/2026| 00:00      AUTOPAY RETURNED                     C 5,797.00   l
        20/04/2026| 00:00      10% MUNCH CASHBACK                   + C 350.00   l
        23/04/2026| 00:00      FINANCE CHARGES                      C 298.48     l
        23/04/2026| 00:00      IGST-RATE 18.0                       C 53.73      l
        Cashback this cycle  C 596.50
        Total Amount Due  C 1,140.21
    assert:
      - type: javascript
        value: 'output.drafts.length >= 6 && output.clarifies.length === 0'
        metric: captured-most
      - type: javascript
        value: "output.drafts.some(d => d.text.includes('Liabilities:CreditCards:Munch'))"
        metric: card-leg
      # A cashback card must NOT accrue a points/miles currency.
      - type: javascript
        value: "!output.drafts.some(d => /(PTS|MILES|POINTS)\\b/.test(d.text))"
        metric: no-points-on-cashback
      - type: llm-rubric
        value: |
          The drafts ingest a CASHBACK card statement. Purchases post to
          Liabilities:CreditCards:Munch…; this is a cashback card so NO points/miles
          currency is invented. The "10% MUNCH CASHBACK + C…" lines are cashback
          credits, the "AUTOPAY THANK YOU + C 5,797" is a payment, and the
          "AUTOPAY RETURNED C 5,797" REVERSES that payment (the two net out).
          "FINANCE CHARGES" is an interest expense and the IGST line is a tax —
          both expenses. PASS if purchases, cashback, the payment+reversal pair,
          the finance charge and the tax are each handled coherently and the batch
          balances.

  # ---- C: points card, "CR" credit suffix, a Merchant Category column, a
  #         payment row. IndusInd-RuPay-shaped. ----
  - description: 'statement — points card with CR-suffix credits and a payment'
    vars:
      seed: |
        2026-01-02 * "Trident" "Welcome points"
          Assets:Rewards:Points:Trident   500 TRIDPTS
          Equity:Void                     -500 TRIDPTS

        2026-01-03 * "Corner Store" "Setup"
          Expenses:Misc                            100 INR
          Liabilities:CreditCards:Trident:Rewards -100 INR
      message: |
        add everything from my Trident Platinum statement:

        Trident Platinum Credit Card Statement — 18 Feb 2026
        DATE         TRANSACTION DETAILS              MERCHANT CATEGORY     POINTS    AMOUNT
        16/01/2026   PLAINPAY ONLINE                  Utilities             0         2,845.00 CR
        18/01/2026   HARBOUR DELI                     Dining                24        1,180.00
        21/01/2026   NORTHSIDE FUELS                  Fuel                  10        980.00
        25/01/2026   STITCHLINE APPAREL               Apparel               60        3,000.00
        29/01/2026   BOOKNEST STORE                   Retail                14        720.00
        02/02/2026   PAYMENT RECEIVED                                       0         4,500.00 CR
        08/02/2026   GLOWWELL PHARMACY                Health                8         410.00
        12/02/2026   TRAILGEAR OUTDOORS               Sports                36        1,800.00
        Rewards: Opening 500 · Earned 152 · Redeemed 0 · Closing Balance(Points) 652
        Total Amount Due  3,955.00
    assert:
      - type: javascript
        value: 'output.drafts.length >= 5 && output.clarifies.length === 0'
        metric: captured-most
      - type: javascript
        value: "output.drafts.some(d => d.text.includes('Liabilities:CreditCards:Trident'))"
        metric: card-leg
      - type: javascript
        value: "output.drafts.some(d => d.text.includes('TRIDPTS'))"
        metric: points-accrue
      - type: llm-rubric
        value: |
          The drafts ingest a points card statement where "CR" after an amount means
          a CREDIT. Purchases (no CR) post to Liabilities:CreditCards:Trident… and
          accrue the stated POINTS column into the TRIDPTS pool. "PAYMENT RECEIVED …
          4,500.00 CR" is a payment that reduces the card balance (no expense, no
          points). The "PLAINPAY ONLINE … 2,845.00 CR" is a credit/refund, not a
          fresh purchase. PASS if the CR lines are treated as credits and the plain
          purchases earn their points.

  # ---- D: rewards card, plain monthly layout (annual fee waived). HSBC-Premier
  #         -shaped — the "ordinary" baseline, should be the easiest. ----
  - description: 'statement — FIRST upload of a card the user does NOT hold (opens its own account)'
    # The user holds a DIFFERENT card (Vista). The uploaded statement is for a
    # Crown Premier they don't track yet — so the model must OPEN a new
    # Liabilities:CreditCards:Crown… account and draft against THAT, not bail and
    # not fall back to the unrelated held Vista card.
    vars:
      seed: |
        2026-01-03 * "Corner Store" "Setup"
          Expenses:Misc                          100 INR
          Liabilities:CreditCards:Vista:Everyday -100 INR
      message: |
        add everything from my Crown Premier statement:

        Crown Premier Credit Card Statement — 25 May 2026
        Annual Fee 20,000 (Waived for Qualified Premier)
        DATE         TRANSACTION DETAILS              REWARD POINTS    AMOUNT (Rs.)
        27/04/2026   LUMOS ELECTRONICS                89               8,900.00
        29/04/2026   GROVE CAFE                       14               1,420.00
        02/05/2026   METROLINE TRANSIT                6                620.00
        05/05/2026   PEAKVIEW HOTELS                  150              15,000.00
        09/05/2026   SUNDRY BAZAAR                    21               2,150.00
        14/05/2026   PAYMENT - THANK YOU              0                12,000.00 CR
        18/05/2026   FRESHLEAF GROCERS                9                940.00
        Reward Points Balance as on 25 May 2026: 2,289
        Net Outstanding / Total Payment Due  17,030.00
    assert:
      - type: javascript
        value: 'output.drafts.length >= 5 && output.clarifies.length === 0'
        metric: captured-most
      # First upload of an UNHELD card → the model must OPEN it (post to a new
      # Liabilities:CreditCards:Crown… account derived from the header), not bail.
      - type: javascript
        value: "output.drafts.some(d => /Liabilities:CreditCards:Crown/.test(d.text))"
        metric: new-card-opened
      # …and must NOT fall back to the unrelated held card.
      - type: javascript
        value: "!output.drafts.some(d => /Liabilities:CreditCards:Vista/.test(d.text))"
        metric: not-the-held-card
      # Fictional issuer → no card_guide → model improvises the currency name;
      # assert it accrues SOME reward leg, not an exact ticker.
      - type: javascript
        value: "output.drafts.some(d => /Assets:Rewards/.test(d.text))"
        metric: reward-leg
      - type: llm-rubric
        value: |
          This is the FIRST upload of a Crown Premier card that the user does NOT
          already hold (their only held card is a different one, "Vista"). The model
          must OPEN a new account for this card — every purchase posts to a
          Liabilities:CreditCards:Crown… account it creates from the header — and
          accrue the stated REWARD POINTS into a Crown reward pool. The annual-fee
          line is informational (waived) — no charge. "PAYMENT - THANK YOU …
          12,000.00 CR" is a payment, not an expense. PASS only if it opens and uses
          a Crown card account (NOT the held Vista card) and captures every purchase
          with its points and the payment.

  # ---- E: points card with a FOREX MARKUP FEE and "Dr" debit suffix on an
  #         international spend. Axis-Magnus-shaped. ----
  - description: 'statement — points card, forex markup fee, international spend'
    vars:
      seed: |
        2026-01-02 * "Summit" "Welcome points"
          Assets:Rewards:Points:Summit   3000 SUMMITPTS
          Equity:Void                   -3000 SUMMITPTS

        2026-01-03 * "Corner Store" "Setup"
          Expenses:Misc                           100 INR
          Liabilities:CreditCards:Summit:Rewards -100 INR
      message: |
        add everything from my Summit Apex statement:

        Summit Apex Credit Card Statement — 08 May 2026
        DATE         TRANSACTION DETAILS                 MERCHANT CATEGORY    AMOUNT (Rs.)
        27/04/2026   AETHER CLOUD SERVICES (USD 24.00)   Software             2,005.20 Dr
        27/04/2026   FOREIGN CURRENCY TRANSACTION FEE                         70.18 Dr
        29/04/2026   HORIZON AIR (USD 110.00)            Travel               9,191.00 Dr
        29/04/2026   FOREIGN CURRENCY TRANSACTION FEE                         321.69 Dr
        02/05/2026   CITYLINE GROCERS                    Grocery              1,460.00 Dr
        05/05/2026   THE READING ROOM                    Retail               840.00 Dr
        08/05/2026   PAYMENT RECEIVED                                         6,000.00 Cr
        eDGE REWARD POINTS BALANCE AS ON DATE: 1,044
        Total Payment Due  9,557.72
    assert:
      - type: javascript
        value: 'output.drafts.length >= 5 && output.clarifies.length === 0'
        metric: captured-most
      - type: javascript
        value: "output.drafts.some(d => d.text.includes('Liabilities:CreditCards:Summit'))"
        metric: card-leg
      # The forex markup fee must be captured as an expense, not silently dropped.
      - type: javascript
        value: "output.drafts.some(d => /Expenses\\S*(Fee|Forex|Markup|Charge)/i.test(d.text) || /70\\.18|321\\.69/.test(d.text))"
        metric: forex-fee-captured
      - type: llm-rubric
        value: |
          The drafts ingest a points card statement with international spends. Each
          purchase posts to Liabilities:CreditCards:Summit… ("Dr" = debit/spend).
          The two "FOREIGN CURRENCY TRANSACTION FEE" lines are forex markup EXPENSES
          and must be captured (not dropped). "PAYMENT RECEIVED … 6,000.00 Cr" is a
          payment. Reward points may be accrued for purchases if a rate is evident,
          but the forex fee earns none. PASS if all spends + both forex fees are
          captured and the payment is handled.
