# MilesVault CONCIERGE eval — Category 1 (transfer partners & ratios).
#
# Runs the REAL concierge turn (gemma + the real concierge prompt + the full
# read-tool surface incl. codemode + reward_accounts) on the deployed staging
# worker via ConciergeDO.__bench_run, and grades structurally + with a judge.
# Mirrors the editor suite (promptfooconfig.yaml) — same bench endpoint, same
# judge — but POSTs {agent:'concierge'} so the route dispatches to the concierge.
#
# Run:  pnpm eval:concierge      (needs TEST_USER_TOKEN in env; see evals/README.md)
# View: pnpm eval:view
#
# Each case POSTs {agent, seed, message} to /api/test/bench, which resets+seeds
# the shared test ledger then runs one concierge turn. The provider output is the
# full envelope:
#   { text, trace:[{tool,input}], links:[{href,kind,target,dir,targetExists}],
#     awardOptions, asks, toolsUsed, error }
# Structural asserts are inline JS over that object; the judge (llm-rubric) grades
# correctness via a stronger model served by /api/test/judge.
#
# Cases mirror evals/concierge-questions.md §1: items 1/2/6/7 = a /points deep
# link; items 3/4/5 = an INLINE single fact. The DEFAULT asserts below encode the
# regressions we fixed: never answer a /points question from memory (reward_accounts
# must run), and every /points target slug must be REAL (no program/britishairways).
#
# NOTE: one shared test ledger → cases MUST run serially. pnpm eval passes -j 1.

description: MilesVault concierge behavior eval (Category 1)

prompts:
  - '{{message}}'

providers:
  - id: 'https://staging.milesvault.com/api/test/bench'
    label: concierge
    config:
      method: POST
      headers:
        'Content-Type': 'application/json'
        'cookie': 'mv-test-token={{env.TEST_USER_TOKEN}}; mv-test-account={{env.MV_TEST_ACCOUNT}}'
      body:
        agent: 'concierge'
        message: '{{message}}'
        seed: '{{seed}}'
      transformResponse: 'json'

defaultTest:
  vars:
    # Seed every case from the shared synthetic fixture so holdings-aware cases
    # ("from my cards", "best card I have for X") have real held cards to reason
    # over. Self-contained: each case re-seeds its own account (turns are
    # read-only, so re-seeding only matters when the required state differs).
    seed: file://fixtures/seed-all.beancount
  options:
    provider:
      id: 'https://staging.milesvault.com/api/test/judge'
      config:
        method: POST
        headers:
          'Content-Type': 'application/json'
          'cookie': 'mv-test-token={{env.TEST_USER_TOKEN}}; mv-test-account={{env.MV_TEST_ACCOUNT}}'
        body:
          prompt: '{{prompt}}'
        transformResponse: 'json.output'
  assert:
    # Gemma tool-call tokens must never leak into the text channel.
    - type: javascript
      value: "!String(output.text || '').includes('tool_call')"
      metric: no-garble
    # GROUNDING: if a /points link was emitted, reward_accounts MUST have run —
    # the concierge never builds a link from memory (the program/britishairways bug).
    - type: javascript
      value: "!output.links.some(l => l.kind === 'points') || output.trace.some(t => t.tool === 'reward_accounts')"
      metric: link-is-grounded
    # SLUG IS REAL: every /points target must resolve to an actual KB node.
    - type: javascript
      value: "output.links.filter(l => l.kind === 'points').every(l => l.targetExists === true)"
      metric: slug-is-real

tests:
  # ---- 1. enumerate → /points link, OUTBOUND (Marriott is the source) ----
  - description: '1 — what does Marriott Bonvoy transfer to (link, dir=from)'
    vars:
      message: 'What does Marriott Bonvoy transfer to, and at what ratios?'
    assert:
      - type: javascript
        value: "output.links.some(l => l.kind === 'points' && /marriott-bonvoy/.test(l.target || ''))"
        metric: targets-marriott
      - type: javascript
        value: "output.links.some(l => l.kind === 'points' && l.dir === 'from')"
        metric: dir-outbound
      - type: javascript
        value: "output.trace.some(t => t.tool === 'reward_accounts')"
        metric: called-reward-accounts
      - type: llm-rubric
        value: >
          The reply points the user to the Marriott Bonvoy points page via a
          /points deep link and does NOT recite a full table of transfer partners
          and ratios in the chat text. A one-line lead-in before the link is fine.

  # ---- 2. reach a currency "from my cards" → /points link, INBOUND ----
  - description: '2 — how do I get Avios from my cards (link, resolves)'
    vars:
      message: 'How do I get Avios from my cards?'
    assert:
      - type: javascript
        value: "output.links.some(l => l.kind === 'points')"
        metric: emits-points-link
      - type: javascript
        value: "output.links.some(l => l.kind === 'points' && l.dir === 'to')"
        metric: dir-inbound
      - type: llm-rubric
        value: >
          The reply gives a /points deep link for Avios that resolves to a real
          programme (program/avios now aliases to British Airways Club, or it may
          target the-club / Qatar / Iberia directly — all fine). It does not recite
          ratios in chat.

  # ---- 3. single named A→B fact → INLINE ratio, no link, no wandering ----
  - description: '3 — MR → KrisFlyer ratio (inline, no link)'
    vars:
      message: "What's the transfer ratio from Amex Membership Rewards to KrisFlyer?"
    assert:
      - type: javascript
        value: "!output.links.some(l => l.kind === 'points')"
        metric: no-link
      - type: javascript
        value: "/(800\\s*[:/ ]\\s*400)|(2\\s*[:]\\s*1)/.test(output.text)"
        metric: states-ratio
      - type: javascript
        value: "output.trace.length <= 6"
        metric: no-wandering
      - type: llm-rubric
        value: >
          The reply states the Amex Membership Rewards → KrisFlyer transfer ratio
          inline (2:1, i.e. 800:400 — twice as many MR points as KrisFlyer miles).
          It did NOT deflect to a /points link and did NOT fabricate a different ratio.

  # ---- 4. single A→B fact → INLINE timing ----
  - description: '4 — SmartBuy → KrisFlyer transfer time (inline)'
    vars:
      message: 'how long does a smartbuy to krisflyer transfer take?'
    assert:
      - type: javascript
        value: "!output.links.some(l => l.kind === 'points')"
        metric: no-link
      - type: javascript
        value: "/(hour|day|minute|instant|immediate)/i.test(output.text)"
        metric: states-timing
      - type: llm-rubric
        value: >
          The reply states the SmartBuy → KrisFlyer transfer TIMING inline (a
          duration read from the KG), or — if there is no such direct transfer —
          says so plainly. It did not fabricate a duration and did not deflect a
          one-value question to a /points link.

  # ---- 5. single fact → INLINE yes/no + threshold ----
  - description: '5 — does Marriott Bonvoy give a transfer bonus (inline yes)'
    vars:
      message: 'Does Marriott Bonvoy give a transfer bonus?'
    assert:
      - type: javascript
        value: "/bonus/i.test(output.text)"
        metric: mentions-bonus
      - type: llm-rubric
        value: >
          The reply answers YES — Marriott Bonvoy gives a standing transfer bonus
          of 5,000 extra airline miles per 60,000 points transferred (60,000 → 25,000
          at the 3:1 base). It did NOT claim there is "no active bonus".

  # ---- 6. reach a currency → /points link, INBOUND ----
  - description: '6 — how do I get Qatar miles (link)'
    vars:
      message: 'how do I get Qatar miles?'
    assert:
      - type: javascript
        value: "output.links.some(l => l.kind === 'points')"
        metric: emits-points-link
      - type: javascript
        value: "output.links.some(l => l.kind === 'points' && l.dir === 'to')"
        metric: dir-inbound
      - type: javascript
        value: "output.trace.some(t => t.tool === 'reward_accounts')"
        metric: called-reward-accounts
      - type: llm-rubric
        value: >
          The reply gives a /points deep link targeting Qatar's programme (Qatar
          Privilege Club, or an Avios programme that reaches Qatar). It does not
          recite routes/ratios in chat.

  # ---- 7. best card for a currency → /points link (the grounding regression) ----
  - description: '7 — best card for Avios (link, grounded, resolves)'
    vars:
      message: 'what is the best card for avios?'
    assert:
      - type: javascript
        value: "output.links.some(l => l.kind === 'points')"
        metric: emits-points-link
      - type: javascript
        value: "output.trace.some(t => t.tool === 'reward_accounts')"
        metric: called-reward-accounts
      - type: javascript
        value: "output.links.some(l => l.kind === 'points' && l.dir === 'to')"
        metric: dir-inbound
      - type: llm-rubric
        value: >
          The reply gives a /points deep link for Avios that resolves to a real
          programme (program/avios now aliases to British Airways Club, or the-club
          directly — both fine), reached by calling reward_accounts. NOT a made-up
          slug like program/britishairways (which does not resolve).

  # ===== 2. Card earning (EARNS_INTO) — KG fact, prose, NOT a link =====
  - description: '2a — what does HDFC Infinia earn into'
    vars:
      message: 'What does the HDFC Infinia earn into?'
    assert:
      - type: javascript
        value: "!output.links.some(l => l.kind === 'points') && output.awardOptions.length === 0"
        metric: stays-branch-d
      - type: llm-rubric
        value: >
          States that the HDFC Infinia earns HDFC Reward Points (redeemable via
          SmartBuy). A concise prose fact — not a /points or /explore link.
  - description: '2b — Axis Atlas earns + transfers to'
    vars:
      message: 'What currency does the Axis Atlas earn, and what does it transfer to?'
    assert:
      - type: llm-rubric
        value: >
          Says the Axis Atlas earns EDGE Miles (Axis EDGE / Atlas miles) and notes
          they transfer to airline/hotel partners (it may drop a /points link for
          the partner list, but must NOT fabricate ratios or partners in prose).

  # ===== 3. Issuers, networks, co-brands (ISSUED_BY / ON_NETWORK) =====
  - description: '3a — network of HDFC Diners Club Black'
    vars:
      message: 'What network is the HDFC Diners Club Black on?'
    assert:
      - type: javascript
        value: "/diners club/i.test(output.text)"
        metric: says-diners
      - type: javascript
        value: "output.awardOptions.length === 0"
        metric: no-award
  - description: '3b — who issues the Tata Neu cards'
    vars:
      message: 'Who issues the Tata Neu cards?'
    assert:
      - type: llm-rubric
        value: >
          Identifies HDFC Bank as the issuer of the Tata Neu (Infinity / Plus)
          co-brand cards. No fabricated issuer.

  # ===== 4. Card selection by spend (EARN_RULE) — known weak area (task #21) =====
  - description: '4a — cards that earn on rent / property'
    vars:
      message: 'Which cards still earn rewards on rent / property payments?'
    assert:
      - type: llm-rubric
        value: >
          Names real cards that earn on rent (e.g. IndusInd cards, or cards with a
          capped rent earn) and does NOT claim every card is excluded. Grounded in
          the KG's EARN_RULE data, no invented cards. (Coverage is incomplete — a
          partial-but-correct list passes; a fabricated list fails.)
  - description: '4b — best card for fuel in India'
    vars:
      message: 'Best card for fuel spends in India?'
    assert:
      - type: llm-rubric
        value: >
          Surfaces genuine fuel cards (e.g. a BPCL / HPCL / IndianOil co-brand, or
          a card with a fuel-surcharge benefit). Must not invent a card or claim a
          rate not in the KG.

  # ===== 5. Airlines, alliances & bookability =====
  - description: '5a — Qatar Airways alliance'
    vars:
      message: 'Which alliance is Qatar Airways in?'
    assert:
      - type: javascript
        value: "/oneworld/i.test(output.text)"
        metric: says-oneworld
  - description: '5b — book ANA with Virgin Atlantic points'
    vars:
      message: 'Can I book ANA flights with Virgin Atlantic points?'
    assert:
      - type: llm-rubric
        value: >
          Answers from the graph whether Virgin Atlantic Flying Club can book ANA
          award seats (it can, as a partner). A grounded yes/no, not a fabrication.

  # ===== 6. Award flights → /explore (show_award_options) =====
  - description: '6a — Delhi to Tokyo business on points'
    vars:
      message: 'Cheapest way to fly Delhi to Tokyo in business class with points?'
    assert:
      - type: javascript
        value: "output.awardOptions.length > 0"
        metric: calls-award-options
      - type: javascript
        value: "/\\bDEL\\b/.test(JSON.stringify(output.awardOptions)) && /\\b(NRT|HND|TYO)\\b/.test(JSON.stringify(output.awardOptions))"
        metric: right-iata
      - type: javascript
        value: "!output.links.some(l => l.kind === 'points')"
        metric: not-points-link
      - type: llm-rubric
        value: >
          Hands off to the Award Explorer (/explore) for Delhi→Tokyo and does NOT
          price the award or name mile figures in chat — at most one short sentence.
  - description: '6b — Bangalore to London on miles'
    vars:
      message: 'Best way to get to London from Bangalore on miles?'
    assert:
      - type: javascript
        value: "output.awardOptions.length > 0"
        metric: calls-award-options
      - type: javascript
        value: "/\\bBLR\\b/.test(JSON.stringify(output.awardOptions)) && /\\b(LHR|LON|LGW)\\b/.test(JSON.stringify(output.awardOptions))"
        metric: right-iata

  # ===== 7. Path to points → /points link =====
  - description: '7a — cheapest way to top up Avios from India'
    vars:
      message: "What's the cheapest way to top up Avios from India?"
    assert:
      - type: javascript
        value: "output.links.some(l => l.kind === 'points')"
        metric: points-link
      - type: llm-rubric
        value: >
          Points to the /points screen for Avios with a link that resolves
          (program/avios now aliases to British Airways Club, or a concrete Avios
          programme directly — both fine). Does not recite transfer routes/ratios.
  - description: '7b — which of my currencies reach Aeroplan'
    vars:
      message: 'Which of my currencies can reach Aeroplan, and how?'
    assert:
      - type: javascript
        value: "output.links.some(l => l.kind === 'points') || output.toolsUsed.some(t => ['codemode','query_sql','ledger_snapshot'].includes(t))"
        metric: link-or-grounded-walk
      - type: llm-rubric
        value: >
          Answers from the user's ACTUAL holdings — either a /points link targeting
          Aeroplan (Air Canada), OR a grounded walk listing the held currencies
          that reach Aeroplan. Either is acceptable per the spec; it must not
          hypothesize currencies the user doesn't hold.

  # ===== 8. Status match — NOT a built concierge route; must not fabricate =====
  - description: '8a — oneworld Sapphire status (unbuilt route)'
    vars:
      message: 'How do I get oneworld Sapphire status?'
    assert:
      - type: llm-rubric
        value: >
          Gives a grounded, honest answer about reaching oneworld Sapphire (tier
          earned with a member airline / via status match) OR says it can't help
          with that yet — but does NOT fabricate a fake link, programme, or numbers.

  # ===== 9. Hotel programmes & portfolios =====
  - description: '9a — brands in World of Hyatt'
    vars:
      message: 'Which hotel brands are in World of Hyatt?'
    assert:
      - type: llm-rubric
        value: >
          Lists real World of Hyatt brands (e.g. Park Hyatt, Grand Hyatt, Andaz,
          Hyatt Regency, etc.) from the graph. No invented brands.
  - description: '9b — move hotel points to an airline'
    vars:
      message: 'Can I move hotel points to an airline, and which ones?'
    assert:
      - type: llm-rubric
        value: >
          Explains that some hotel programmes (e.g. Marriott Bonvoy) transfer to
          airlines, grounded in the KG. May offer a /points link; must not invent
          ratios or partners in prose.

  # ===== 10. Buying points (BUYS_INTO) =====
  - description: '10a — buy Avios with cash + cost'
    vars:
      message: 'Can I buy Avios with cash, and roughly what does it cost per point?'
    assert:
      - type: llm-rubric
        value: >
          Answers that Avios can be bought (yes) and gives a cost-per-point only if
          grounded in the KG's buy-price data; otherwise says it varies. No invented
          price.

  # ===== 11. My cards / holdings (held cards from the fixture) =====
  - description: '11a — which of my cards earns Marriott points'
    vars:
      message: 'Which of my cards earns Marriott Bonvoy points?'
    assert:
      - type: javascript
        value: "/marriott/i.test(output.text)"
        metric: names-marriott-card
      - type: llm-rubric
        value: >
          Identifies the held HDFC Marriott Bonvoy card from the user's ledger.
          Grounded in their actual holdings — does NOT hypothesize cards they don't
          hold, and does NOT dump the whole card universe.
  - description: '11b — best card I have for dining'
    vars:
      message: "What's my best card for dining?"
    assert:
      - type: javascript
        value: "/live\\s*\\+|hsbc/i.test(output.text)"
        metric: names-live-plus
      - type: llm-rubric
        value: >
          From the user's HELD cards, picks the HSBC Live+ (10% dining cashback) as
          the best dining card. Grounded in their holdings, not the universe.
  - description: '11c — do any of my cards earn Avios'
    vars:
      message: 'Do any of my cards earn Avios?'
    assert:
      - type: javascript
        value: "/avios|indusind/i.test(output.text)"
        metric: names-avios-card
      - type: llm-rubric
        value: >
          Confirms the held IndusInd Avios Visa Infinite earns Avios. Grounded in
          the user's holdings.

  # ===== 12. Ledger analytics (query_sql over the fixture) =====
  - description: '12a — points balances across programmes'
    vars:
      message: 'What are my points balances across all programmes?'
    assert:
      - type: javascript
        value: "/marriott/i.test(output.text) && /amex|membership/i.test(output.text)"
        metric: lists-pools
      - type: llm-rubric
        value: >
          Lists the user's reward balances per programme from their ledger — e.g.
          Marriott ~95,000, Amex MR ~80,000, HDFC ~122,050, Avios ~5,000, Axis
          ~45,000, SBI ~15,000 (settled; pending may be noted separately). Figures
          come from the ledger, not invented.
  - description: '12b — Marriott stays in 2026'
    vars:
      message: 'Show my Marriott stays in 2026.'
    assert:
      - type: javascript
        value: "/riverside/i.test(output.text) || /hilltop/i.test(output.text)"
        metric: names-a-stay
      - type: llm-rubric
        value: >
          Lists the two 2026 Marriott hotel stays from the ledger (Marriott
          Riverside ~24,000 INR and Marriott Hilltop ~31,000 INR). No invented stays.
  - description: '12c — fuel spend → /accounts expense-explorer link'
    vars:
      message: 'How much have I spent on fuel this year?'
    assert:
      - type: javascript
        value: "output.links.some(l => l.kind === 'accounts' && /Expenses/i.test(l.target || ''))"
        metric: accounts-link
      - type: javascript
        value: "output.toolsUsed.includes('list_accounts')"
        metric: grounded-via-list-accounts
      - type: llm-rubric
        value: >
          Routes the fuel-spend question to the /accounts expense explorer with a
          prefix under Expenses pointing at the fuel category (e.g.
          Expenses:Transport:Fuel), grounded via list_accounts — rather than
          totalling the spend in chat with SQL.

  # ===== 13. Ambiguity → ask, don't guess =====
  - description: '13a — best card (no category given)'
    vars:
      message: "What's the best card?"
    assert:
      - type: javascript
        value: "output.asks.length > 0"
        metric: asks-clarifying
      - type: llm-rubric
        value: >
          Asks a clarifying question (best card for WHAT — a spend category, a
          currency, travel?) rather than guessing a single "best card".
  - description: '13b — how do I get to Tokyo (no origin/cabin)'
    vars:
      message: 'How do I get to Tokyo?'
    assert:
      - type: llm-rubric
        value: >
          Recognises the missing origin (and cabin) and either asks for it or hands
          to the Explorer with Tokyo prefilled — it does NOT invent an origin city
          or price a specific award in chat.

  # ===== 14. Out of scope → decline cleanly =====
  - description: '14a — weather (out of domain)'
    vars:
      message: "What's the weather in Tokyo next week?"
    assert:
      - type: javascript
        value: "output.links.length === 0 && output.awardOptions.length === 0"
        metric: no-tools-fired
      - type: llm-rubric
        value: >
          Declines cleanly — says weather is out of scope for a points/miles
          assistant. No fabricated forecast, no irrelevant link.
  - description: '14b — stock advice (out of domain)'
    vars:
      message: 'Should I buy this stock?'
    assert:
      - type: javascript
        value: "output.links.length === 0 && output.awardOptions.length === 0"
        metric: no-tools-fired
      - type: llm-rubric
        value: >
          Declines cleanly — financial-securities advice is out of scope. No
          fabricated recommendation.
