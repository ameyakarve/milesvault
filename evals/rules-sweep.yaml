# Rules-sweep — a one-shot BASELINE eval generated from the ledger rules +
# taxonomy. Each case exercises one rule/pattern with SYNTHETIC data only
# (Skyline/SKYMILES, Skybank, Horizon, invented merchants). Same harness as
# promptfooconfig.yaml (real editor turn on staging, structural + judge).
# Run:  pnpm eval -- -c evals/rules-sweep.yaml   (needs TEST_USER_TOKEN)
# Purpose: nail down where the editor stands per rule — NOT a regression gate.

description: MilesVault rules-sweep baseline

prompts:
  - '{{message}}'

providers:
  - id: 'https://staging.milesvault.com/api/test/bench'
    label: editor
    config:
      method: POST
      headers:
        'Content-Type': 'application/json'
        'cookie': 'mv-test-token={{env.TEST_USER_TOKEN}}'
      body:
        message: '{{message}}'
        seed: '{{seed}}'
      transformResponse: 'json'

defaultTest:
  options:
    provider:
      id: 'https://staging.milesvault.com/api/test/judge'
      config:
        method: POST
        headers:
          'Content-Type': 'application/json'
          'cookie': 'mv-test-token={{env.TEST_USER_TOKEN}}'
        body:
          prompt: '{{prompt}}'
        transformResponse: 'json.output'
  assert:
    - type: javascript
      value: "!String(output.text || '').includes('tool_call')"
      metric: no-garble

tests:
  # ---- RULE: a card purchase earns points → 4 postings (block rate) ----
  - description: 'purchase — earns points, four postings'
    vars:
      seed: |
        2026-01-02 * "Skybank" "Welcome points"
          Assets:Rewards:Points:Skybank:Pending   100 SKYBANKPTS
          Equity:Void                            -100 SKYBANKPTS

        2026-01-03 * "Corner Store" "Setup"
          Expenses:Misc                            100 INR
          Liabilities:CreditCards:Skybank:Rewards -100 INR
      message: 'add a 2000 INR dinner at Olive Bistro on my Skybank Rewards card — it earns 12 points per 200 spent'
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: "output.drafts.some(d => /120\\s+SKYBANKPTS/.test(d.text) && d.text.includes('Equity:Void'))"
        metric: points-accrued
      - type: javascript
        value: "output.drafts.some(d => /Liabilities:CreditCards:Skybank/.test(d.text))"
        metric: uses-held-card
      - type: llm-rubric
        value: >
          Four-posting purchase: Expenses (food/restaurants) +2000 INR, the Skybank
          Rewards card -2000 INR, a points accrual +120 SKYBANKPTS to the pending pool
          (floor(2000/200)*12 = 120), and an Equity:Void -120 SKYBANKPTS contra. No
          points commodity on the expense or card legs.

  # ---- RULE: payment to the card (positive card, clearing leg, no points) ----
  - description: 'payment — to the card via clearing'
    vars:
      seed: |
        2026-01-03 * "Corner Store" "Spend"
          Expenses:Shopping                        3000 INR
          Liabilities:CreditCards:Skybank:Rewards -3000 INR
      message: 'I paid 3000 INR to my Skybank Rewards card from my bank'
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: "output.drafts.some(d => /Liabilities:CreditCards:Skybank:Rewards\\s+3000/.test(d.text) && /Assets:Clearing:CardPayments\\s+-3000/.test(d.text))"
        metric: card-positive-clearing-negative
      - type: javascript
        value: "!output.drafts.some(d => /SKYBANKPTS/.test(d.text))"
        metric: no-points-on-payment
      - type: llm-rubric
        value: >
          A card payment: the Skybank Rewards card leg is POSITIVE +3000 INR (reduces
          what is owed) and Assets:Clearing:CardPayments is -3000 INR. No expense, no
          points earned.

  # ---- RULE: instant discount (negative leg on the expense, no receivable) ----
  # Paid CASH so the instrument doesn't trigger a card-guide/earn-rate lookup —
  # isolates the discount logic.
  - description: 'discount — instant, reduces the bill'
    vars:
      seed: ''
      message: 'add a 500 INR dinner at Olive Bistro, paid cash, with a 50 INR instant discount applied to the bill'
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: "output.drafts.some(d => /-50(\\.00)?\\s+INR/.test(d.text)) && !output.drafts.some(d => /Assets:Receivable/.test(d.text))"
        metric: expense-reduced-no-receivable
      - type: llm-rubric
        value: >
          An instant (point-of-sale) discount: a NEGATIVE -50 INR leg on the same
          expense reduces the bill, the card pays the net (-450 INR), and there is NO
          Assets:Receivable and NO Equity:Void plug. (Not the deferred-cashback shape.)

  # ---- RULE: deferred cashback (receivable + Equity:Void, expense NOT reduced) ----
  - description: 'cashback — deferred, mints from Equity:Void'
    vars:
      seed: |
        2026-01-03 * "Corner Store" "Setup"
          Expenses:Misc                            100 INR
          Liabilities:CreditCards:Skybank:Rewards -100 INR
      message: 'add a 1000 INR grocery at Corner Store on my Skybank Rewards card — 5% cashback that gets credited to a later statement'
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: "output.drafts.some(d => /Assets:Receivable/.test(d.text) && d.text.includes('Equity:Void'))"
        metric: receivable-and-void
      - type: javascript
        value: "!output.drafts.some(d => /Expenses\\S*\\s+-50(\\.00)?\\s+INR/.test(d.text))"
        metric: expense-not-reduced
      - type: llm-rubric
        value: >
          Deferred cashback: full 1000 INR expense (NOT reduced), the card -1000 INR,
          a +50 INR Assets:Receivable accrual, and an Equity:Void -50 INR contra. The
          expense is not reduced and no Income account is used.

  # ---- RULE: forex — foreign amount @@ billed amount, card debited the billed ----
  - description: 'forex — USD charge billed in INR'
    vars:
      seed: |
        2026-01-03 * "Corner Store" "Setup"
          Expenses:Misc                            100 INR
          Liabilities:CreditCards:Skybank:Rewards -100 INR
      message: 'add a USD 50 charge at Cloud Host (a US software vendor) on my Skybank Rewards card — it was billed as 4200 INR'
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: "output.drafts.some(d => /50(\\.00)?\\s+USD\\s+@@\\s+4200/.test(d.text))"
        metric: foreign-amount-priced
      - type: javascript
        value: "output.drafts.some(d => /Liabilities:CreditCards:Skybank:Rewards\\s+-4200/.test(d.text))"
        metric: card-debited-billed
      - type: llm-rubric
        value: >
          A foreign charge: the expense leg is 50 USD @@ 4200 INR (foreign amount with
          the billed amount as the @@ total price), and the Skybank card is debited
          -4200 INR (the billed amount). The USD and INR amounts are never equated.

  # ---- RULE: category mapping to a canonical root (Health, not Medical) ----
  - description: 'category — doctor maps to Expenses:Health'
    vars:
      seed: ''
      message: 'add a 800 INR doctor consultation at City Clinic, paid cash'
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: "output.drafts.some(d => /Expenses:Health/.test(d.text)) && !output.drafts.some(d => /Expenses:(Medical|Doctor|Healthcare)/.test(d.text))"
        metric: canonical-health-root
      - type: llm-rubric
        value: >
          The doctor visit is categorised under the canonical Expenses:Health root
          (e.g. Expenses:Health or Expenses:Health:Doctor), paid from cash. It did NOT
          invent a non-canonical root like Expenses:Medical or Expenses:Healthcare.

  # ---- RULE: landing — move earned points from :Pending to the parent ----
  - description: 'landing — post pending points to balance'
    vars:
      seed: |
        2026-01-02 * "Skybank" "Earned this cycle"
          Assets:Rewards:Points:Skybank:Pending   1850 SKYBANKPTS
          Equity:Void                            -1850 SKYBANKPTS
      message: 'my Skybank statement posted 1850 points to my balance this cycle'
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: "output.drafts.some(d => /Assets:Rewards:Points:Skybank\\s+1850\\s+SKYBANKPTS/.test(d.text) && /:Pending\\s+-1850\\s+SKYBANKPTS/.test(d.text))"
        metric: pending-to-parent
      - type: javascript
        value: "!output.drafts.some(d => /1850\\s+SKYBANKPTS/.test(d.text) && d.text.includes('Equity:Void'))"
        metric: no-void-on-landing
      - type: llm-rubric
        value: >
          A landing: +1850 SKYBANKPTS to the parent Assets:Rewards:Points:Skybank and
          -1850 SKYBANKPTS from :Pending — same ticker, NO Equity:Void, NO @@ price.

  # ---- RULE: bonus/promo points accrue (to :Pending + Equity:Void) ----
  - description: 'bonus — promo points accrue'
    vars:
      seed: |
        2026-01-02 * "Skybank" "Welcome points"
          Assets:Rewards:Points:Skybank:Pending   100 SKYBANKPTS
          Equity:Void                            -100 SKYBANKPTS
      message: 'I got 5000 bonus Skybank points from a promo (not tied to any purchase)'
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: "output.drafts.some(d => /5000\\s+SKYBANKPTS/.test(d.text) && d.text.includes('Equity:Void'))"
        metric: bonus-accrued
      - type: javascript
        value: "!output.drafts.some(d => /Expenses/.test(d.text))"
        metric: no-expense
      - type: llm-rubric
        value: >
          Bonus points: +5000 SKYBANKPTS accrued (to the pending pool) with an
          Equity:Void -5000 SKYBANKPTS contra. No expense, no card, no @@ price.

  # ---- RULE: transfer between programmes at a ratio (forward; @@ on source) ----
  - description: 'transfer — 10000 Skybank to Skyline at 2:1'
    vars:
      seed: |
        2026-01-02 * "Skybank" "Opening"
          Assets:Rewards:Points:Skybank      20000 SKYBANKPTS
          Equity:Void                       -20000 SKYBANKPTS

        2026-01-02 * "Skyline" "Opening"
          Assets:Rewards:Miles:Skyline        1000 SKYMILES
          Equity:Void                        -1000 SKYMILES
      message: 'transfer 10000 Skybank points to my Skyline miles — it transfers 2:1 (2 Skybank to 1 Skyline)'
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: "output.drafts.some(d => /@@/.test(d.text) && /10000\\s+SKYBANKPTS/.test(d.text) && /5000\\s+SKYMILES/.test(d.text))"
        metric: priced-conversion
      - type: javascript
        value: "output.drafts.some(d => /Assets:Rewards:Miles:Skyline\\s+5000\\s+SKYMILES/.test(d.text)) && !output.drafts.some(d => d.text.includes('Equity:Void'))"
        metric: dest-credited-no-void
      - type: llm-rubric
        value: >
          A points transfer at 2:1: -10000 SKYBANKPTS leaves the Skybank pool and
          +5000 SKYMILES lands in the Skyline pool (10000 / 2 = 5000), the two legs
          tied by an `@@` price between SKYBANKPTS and SKYMILES. (The `@@` may sit on
          either leg — both balance.) No Equity:Void, no expense. Two legs.

  # ---- RULE: refund mirrors the purchase (negative expense, positive card) ----
  - description: 'refund — reverses a purchase'
    vars:
      seed: |
        2026-01-05 * "Olive Bistro" "Dinner"
          Expenses:Food:Restaurants                900 INR
          Liabilities:CreditCards:Skybank:Rewards -900 INR
      message: 'Olive Bistro refunded 900 INR back to my Skybank Rewards card'
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: "output.drafts.some(d => /Expenses:Food\\S*\\s+-900/.test(d.text) && /Liabilities:CreditCards:Skybank:Rewards\\s+900/.test(d.text))"
        metric: expense-neg-card-pos
      - type: llm-rubric
        value: >
          A refund mirrors the purchase: NEGATIVE -900 INR on the food expense and
          POSITIVE +900 INR on the Skybank card (reducing what is owed). It is its own
          entry, not netted into anything.
