# MilesVault editor eval — runs the REAL editor turn (gemma + real prompt +
# real read tools, write tools captured not applied) on the deployed staging
# worker, and grades the result structurally + with an LLM judge.
#
# Run:  pnpm eval         (needs TEST_USER_TOKEN in env; see evals/README.md)
# View: pnpm eval:view
#
# Each case POSTs {seed, message} to /api/test/bench, which resets+seeds the
# test ledger then runs one turn. The provider output is the full JSON:
#   { text, trace, drafts:[{replaces,text}], clarifies, sqls, draftsValid,
#     draftIssues, aliases, error }
# Structural asserts are inline JS over that object; the judge (llm-rubric)
# grades correctness via a stronger model served by /api/test/judge.
#
# NOTE: one shared test ledger → cases MUST run serially. pnpm eval passes -j 1.

description: MilesVault editor behavior eval

prompts:
  - '{{message}}'

providers:
  - id: 'https://staging.milesvault.com/api/test/bench'
    label: editor
    config:
      method: POST
      headers:
        'Content-Type': 'application/json'
        'cookie': 'mv-test-token={{env.TEST_USER_TOKEN}}'
      body:
        message: '{{message}}'
        seed: '{{seed}}'
      transformResponse: 'json'

# Grade llm-rubric assertions with a stronger model (llama via Workers AI),
# served by our judge endpoint — keeps the eval self-contained (no OpenAI key).
defaultTest:
  options:
    provider:
      id: 'https://staging.milesvault.com/api/test/judge'
      config:
        method: POST
        headers:
          'Content-Type': 'application/json'
          'cookie': 'mv-test-token={{env.TEST_USER_TOKEN}}'
        body:
          prompt: '{{prompt}}'
        transformResponse: 'json.output'
  assert:
    # Global guard: the gemma tool-call tokens must never leak into the text
    # channel (the known Workers AI serialization flake).
    - type: javascript
      value: "!String(output.text || '').includes('tool_call')"
      metric: no-garble

tests:
  # ---- READ: resolve a programme name to its account, not text-match it ----
  - description: 'read — which Skyline txns are redemptions'
    vars:
      seed: |
        2026-01-03 * "Grand Coastal Hotel" "Stay paid with points"
          Expenses:Travel:Hotels             9487 INR
          Assets:Rewards:Miles:Skyline     -18000 SKYMILES @@ 9487 INR

        2026-02-10 * "Skyline" "Bonus points"
          Assets:Rewards:Miles:Skyline       2000 SKYMILES
          Equity:Void                       -2000 SKYMILES
      message: 'check my skyline txns from this year -- tell me which of these are redemptions'
    assert:
      - type: javascript
        value: "output.trace.some(t => t.tool === 'search' && /Skyline/.test(JSON.stringify(t.input)))"
        metric: searches-by-account
      - type: javascript
        value: "!output.trace.some(t => t.tool === 'search' && /payee_q/.test(JSON.stringify(t.input)))"
        metric: not-text-match
      - type: llm-rubric
        value: >
          The assistant identified the Grand Coastal Hotel stay (the -18000 SKYMILES
          posting with an @@ price) as a redemption, and the +2000 SKYMILES bonus
          as NOT a redemption (it is an accrual). It must NOT have missed the hotel
          redemption.

  # ---- ADD: use the held card; cashback minted from Equity:Void (NOT an
  #          expense reduction) — the documented cashback pattern ----
  - description: 'add — coffee paid on HSBC (single held card)'
    vars:
      seed: |
        2026-06-10 * "Amazon" "Household"
          Expenses:Shopping                      1200 INR
          Liabilities:CreditCards:HSBC:Cashback -1200 INR
      message: 'add a 350 INR coffee at Blue Tokai today, paid on HSBC'
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: 'output.drafts.length > 0 && output.clarifies.length === 0'
        metric: no-clarify
      - type: javascript
        value: "output.drafts.some(d => d.text.includes('Liabilities:CreditCards:HSBC:Cashback'))"
        metric: uses-held-card
      - type: javascript
        value: "output.drafts.some(d => d.text.includes('Assets:Receivable:HSBC') && d.text.includes('Equity:Void'))"
        metric: cashback-minted-from-void
      - type: javascript
        value: "!output.drafts.some(d => /Expenses:\\S+\\s+-/.test(d.text))"
        metric: expense-not-reduced
      - type: llm-rubric
        value: >
          The draft records a 350 INR purchase at Blue Tokai paid on the existing
          HSBC Cashback card, plus 10% (35 INR) cashback recorded as the documented
          cashback pattern: the FULL 350 INR expense is NOT reduced, and an
          Assets:Receivable:HSBC accrual of 35 INR is minted against an Equity:Void
          contra of -35 INR (the same mint plug points use). It did NOT reduce the
          expense by the cashback, did NOT use Income:Void, and did NOT ask the user
          which HSBC card.

  # ---- EDIT: minimal amount change via replaces ----
  - description: 'edit — change Starbucks amount to 500'
    vars:
      seed: |
        2026-06-12 * "Starbucks" "Morning coffee"
          Expenses:Food:Coffee                   420 INR
          Liabilities:CreditCards:HSBC:Cashback -420 INR

        2026-06-12 * "Uber" "Ride to office"
          Expenses:Transport                     300 INR
          Liabilities:CreditCards:HSBC:Cashback -300 INR
      message: 'change the Starbucks coffee on 2026-06-12 to 500'
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: "output.drafts.some(d => (d.replaces || '').includes('Starbucks') && d.text.includes('Starbucks'))"
        metric: edits-via-replaces
      - type: javascript
        value: "!output.drafts.some(d => (d.replaces || '').includes('Uber') || d.text.includes('Uber'))"
        metric: leaves-uber-alone
      - type: llm-rubric
        value: >
          The draft is an EDIT of the existing Starbucks transaction (it carries a
          `replaces` holding the original Starbucks entry) whose amount is changed to
          500 INR on both postings so it still balances. The Uber transaction is
          untouched. It did not append a new entry to "fix" the old one.

  # ---- DELETE: remove via replaces + empty text ----
  - description: 'delete — remove the Uber ride'
    vars:
      seed: |
        2026-06-12 * "Starbucks" "Morning coffee"
          Expenses:Food:Coffee                   420 INR
          Liabilities:CreditCards:HSBC:Cashback -420 INR

        2026-06-12 * "Uber" "Ride to office"
          Expenses:Transport                     300 INR
          Liabilities:CreditCards:HSBC:Cashback -300 INR
      message: 'delete the Uber ride on 2026-06-12'
    assert:
      - type: javascript
        value: "output.drafts.some(d => (d.replaces || '').includes('Uber') && !String(d.text).trim())"
        metric: deletes-via-replaces
      - type: javascript
        value: "!output.drafts.some(d => (d.replaces || '').includes('Starbucks'))"
        metric: leaves-starbucks-alone
      - type: llm-rubric
        value: >
          The draft DELETES the Uber transaction — exactly one op whose `replaces`
          is the Uber entry and whose `text` is empty. The Starbucks transaction is
          untouched.

  # ---- BALANCE: pure ADD of pad+balance, no phantom replaces ----
  - description: 'balance — set Skyline points to 163316'
    vars:
      seed: |
        2026-02-10 * "Skyline" "Bonus points"
          Assets:Rewards:Miles:Skyline      2000 SKYMILES
          Equity:Void                      -2000 SKYMILES
      message: 'set my Skyline reward points balance to 163316'
    assert:
      - type: javascript
        value: 'output.drafts.length > 0 && output.drafts.every(d => !d.replaces)'
        metric: is-add-not-edit
      - type: javascript
        value: "output.drafts.some(d => d.text.includes('pad') && d.text.includes('balance') && d.text.includes('163316'))"
        metric: pad-and-balance
      - type: llm-rubric
        value: >
          The draft is a fresh pad + balance pair on Assets:Rewards:Miles:Skyline
          asserting 163316 SKYMILES, plugging from Equity:Void, dated today. It is an
          ADD (no `replaces`) — it did NOT fabricate a `replaces` for a balance
          directive that does not exist.

  # ---- REDEMPTION: points leg @@ cash value; credit lands on the card ----
  - description: 'redemption — 5000 points for 2500 statement credit'
    vars:
      seed: |
        2026-01-01 * "Skyline" "Opening points"
          Assets:Rewards:Miles:Skyline       50000 SKYMILES
          Equity:Void                       -50000 SKYMILES

        2026-06-10 * "Corner Store" "Household"
          Expenses:Shopping                       1200 INR
          Liabilities:CreditCards:Skybank:Rewards -1200 INR
      message: 'I redeemed 5000 Skyline points today for a 2500 INR statement credit'
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: "output.drafts.some(d => /-5000\\s+SKYMILES\\s+@@\\s+2500/.test(d.text))"
        metric: points-leg-priced
      - type: llm-rubric
        value: >
          The draft records a redemption: the points leg removes 5000 SKYMILES
          carrying the cash value via `@@ 2500 INR`, and the 2500 INR statement credit
          lands on the user's Skybank card liability (reducing what is owed). It did NOT
          ask for the cash value (the user gave it: 2500) and did NOT denominate any
          expense in points.

  # ---- AWARD-FLIGHT REDEMPTION (rich row, no cash value): redemption, NOT a
  #      reconstructed paid ticket — no card leg, no invented fare, clarify ----
  - description: 'redemption — award flight (no value) is not a purchase'
    vars:
      seed: |
        2026-01-01 * "Skyline" "Opening miles"
          Assets:Rewards:Miles:Skyline      50000 SKYMILES
          Equity:Void                      -50000 SKYMILES
      message: |
        add this from my Skyline statement:
        - SA 100  Skyline Air  LAX - JFK  12 Mar 2026  Economy  Flight  -13,500 Skyline miles
    assert:
      - type: javascript
        value: "!output.drafts.some(d => /Liabilities:CreditCards/.test(d.text))"
        metric: no-card-leg
      - type: javascript
        value: "!output.drafts.some(d => /@@\\s*0(\\.0+)?(\\s|$)/.test(d.text))"
        metric: no-zero-price
      - type: javascript
        value: "output.clarifies.length > 0 || output.drafts.some(d => /-13500\\s+SKYMILES\\s+@@/.test(d.text))"
        metric: clarified-or-priced
      - type: llm-rubric
        value: >
          The -13,500 Skyline miles award flight is treated as a REDEMPTION, not a
          paid ticket. No cash value was given, so the assistant called `clarify` for
          the cash equivalent (or, if it had a value, priced the points leg
          `-13500 SKYMILES @@ <cash> INR` with the cash as the expense). It did NOT
          reconstruct a purchase — NO `Liabilities:CreditCards` card leg, NO invented
          fare, NO `@@ 0`. The points are the payment.

  # ---- ATTRIBUTE earn to its source pool: transfer-FIX at a ratio, keep dest ----
  - description: 'attribute — Skyline accruals are transferred from Horizon (5:4)'
    vars:
      seed: |
        2025-01-01 * "Horizon" "Opening miles"
          Assets:Rewards:Miles:Horizon      100000 HORIZON
          Equity:Void                      -100000 HORIZON

        2025-03-10 * "Partner Bank" "Earn"
          Assets:Rewards:Miles:Skyline      8000 SKYMILES
          Equity:Void                      -8000 SKYMILES

        2025-05-20 * "Partner Bank" "Earn"
          Assets:Rewards:Miles:Skyline      4000 SKYMILES
          Equity:Void                      -4000 SKYMILES
      message: 'the Skyline accruals coming from Partner Bank are actually transferred from my Horizon miles, it used to transfer 5:4. fix them'
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: "output.drafts.some(d => d.text.includes('HORIZON'))"
        metric: real-currency
      - type: javascript
        value: "output.drafts.some(d => d.text.includes('@@'))"
        metric: transfer-priced
      - type: llm-rubric
        value: >
          The model re-drafted the two "Partner Bank" Skyline accruals as TRANSFERS
          from the user's Horizon pool (ticker HORIZON, found in the ledger — not
          guessed) into Skyline SKYMILES, at the 5:4 ratio given (5 HORIZON → 4
          SKYMILES). The destination leg is KEPT unchanged (8000 / 4000 SKYMILES); the
          source leg replaces the Equity:Void contra, so 8000 SKYMILES came from 10000
          HORIZON and 4000 from 5000, carried via `@@`. It did NOT scale the
          destination, did NOT keep an extra Equity:Void, and did NOT invent a ratio.

  # ---- POINTS-ONLY STATEMENT: a points credit with NO fiat amount is a plain
  #      accrual (never a fabricated fiat spend); an award redemption with NO
  #      cash value must clarify (never @@ 0.00, validator-enforced) ----
  - description: 'points statement — credit accrues, unvalued redemption clarifies'
    vars:
      seed: |
        2026-01-01 * "Skyline" "Opening miles"
          Assets:Rewards:Miles:Skyline      50000 SKYMILES
          Equity:Void                      -50000 SKYMILES
      message: |
        add these from my Skyline loyalty statement:
        - 2026-03-10  Credit card spends   +2,000 Skyline miles
        - 2026-03-12  Award flight XY 100 (no cash value shown)   -15,000 Skyline miles
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: "!output.drafts.some(d => /@@\\s*0(\\.0+)?(\\s|$)/.test(d.text))"
        metric: no-zero-price
      - type: javascript
        value: 'output.clarifies.length > 0'
        metric: redemption-clarifies
      - type: javascript
        value: "!output.drafts.some(d => /Expenses\\S*\\s+2000/.test(d.text))"
        metric: no-fabricated-fiat
      - type: javascript
        value: "!output.drafts.some(d => /Liabilities:CreditCards/.test(d.text))"
        metric: no-card-leg
      - type: javascript
        value: "!output.drafts.some(d => /(Expenses|Liabilities)\\S*\\s+-?\\d[\\d.]*\\s+SKYMILES/.test(d.text))"
        metric: no-points-on-fiat-leg
      - type: javascript
        value: "output.drafts.length === 0 || output.drafts.some(d => /SKYMILES/.test(d.text) && d.text.includes('Equity:Void'))"
        metric: credit-accrual-or-deferred
      - type: llm-rubric
        value: >
          The -15,000 award redemption has no cash value given, so the assistant
          called `clarify` to ask for the cash fare — it did NOT record the redemption
          with an `@@ 0.00` price or any zero/placeholder value just to make it balance.
          The +2,000 Skyline miles credit is handled as a PLAIN points accrual (2000
          SKYMILES with an Equity:Void contra) — EITHER drafted now, OR deferred until
          the clarify is answered if the assistant chose to ask first. Either way it
          did NOT treat 2000 as a rupee amount or fabricate an Expenses/INR purchase
          for the credit.

  # ---- EARN ON A FLIGHT: a +miles / +tier row is an accrual, NOT a priced
  #      redemption — no invented fare, no sign flip ----
  - description: 'points statement — flight earn accrues, not a redemption'
    vars:
      seed: |
        2026-01-01 * "Skyline" "Opening miles"
          Assets:Rewards:Miles:Skyline      50000 SKYMILES
          Equity:Void                      -50000 SKYMILES
      message: |
        add this row from my Skyline loyalty statement (I already paid for the ticket):
        - 2026-08-06  SA 100 BLR-DEL (Economy, flew)   +557 Skyline miles   +418 tier points
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: 'output.drafts.length > 0 && output.clarifies.length === 0'
        metric: drafts-no-clarify
      - type: javascript
        value: "output.drafts.some(d => /Assets:Rewards:Miles:Skyline(:Pending)?\\s+557\\s+SKYMILES/.test(d.text)) && !output.drafts.some(d => /Assets:Rewards:Miles:Skyline(:Pending)?\\s+-/.test(d.text))"
        metric: miles-earned-positive
      - type: javascript
        value: "!output.drafts.some(d => /SKYMILES\\s+@@/.test(d.text))"
        metric: no-price-on-earn
      - type: javascript
        value: "!output.drafts.some(d => /Expenses/.test(d.text))"
        metric: no-fabricated-fare
      - type: javascript
        value: "output.drafts.some(d => /Assets:Rewards:Status:Skyline\\s+418\\s+[A-Z][A-Z-]*STATUS/.test(d.text))"
        metric: status-counter-accrues
      - type: llm-rubric
        value: >
          The flight row EARNED points, so it is recorded as a plain accrual: +557
          SKYMILES with an Equity:Void contra, and +418 in a status counter
          (SKYLINE-STATUS) with its own Equity:Void contra. There is NO expense leg,
          NO credit-card leg, NO `@@` price, and the miles are POSITIVE (earned), not
          a negative redemption. The assistant did NOT invent a fare/cash value and
          did NOT flip the sign to treat the earn as a redemption.

  # ---- MULTI-ROW EARN BATCH (under-load repro): a whole loyalty statement of
  #      earns/credits must all stay plain accruals — none flipped to a priced
  #      redemption with a fabricated fare + card leg (the rejection-loop bug) ----
  - description: 'points statement — multi-row earn batch stays accruals'
    vars:
      seed: |
        2026-01-01 * "Skyline" "Opening miles"
          Assets:Rewards:Miles:Skyline      50000 SKYMILES
          Equity:Void                      -50000 SKYMILES
      message: |
        add all of these from my Skyline loyalty statement (I already paid for the tickets in cash):
        - 2026-08-06  SA 100 BLR-DEL (flew)    +557 Skyline miles   +418 tier points
        - 2026-08-03  SA 200 DEL-BLR (flew)    +579 Skyline miles   +347 tier points
        - 2026-07-05  Family pool credit       +9204 Skyline miles
    assert:
      - type: javascript
        value: 'output.draftsValid === true'
        metric: balances
      - type: javascript
        value: 'output.drafts.length > 0 && output.clarifies.length === 0'
        metric: drafts-no-clarify
      - type: javascript
        value: "!output.drafts.some(d => /Liabilities:CreditCards/.test(d.text))"
        metric: no-card-legs
      - type: javascript
        value: "!output.drafts.some(d => /Expenses/.test(d.text))"
        metric: no-fabricated-fare
      - type: javascript
        value: "!output.drafts.some(d => /SKYMILES\\s+@@/.test(d.text))"
        metric: no-price-on-earns
      - type: javascript
        value: "!output.drafts.some(d => /Assets:Rewards:Miles:Skyline(:Pending)?\\s+-/.test(d.text))"
        metric: earns-stay-positive
      - type: javascript
        value: "output.drafts.some(d => /9204\\s+SKYMILES/.test(d.text))"
        metric: pooling-credit-accrues
      - type: llm-rubric
        value: >
          All three rows are EARNS/credits, recorded as plain accruals: each points
          amount POSITIVE to a Skyline miles account with an Equity:Void contra, the
          two flights also accruing their tier points to a status counter. NONE of the
          rows is turned into a redemption: no negative miles leg, no `@@` price, no
          fabricated INR fare, and no credit-card or expense leg anywhere. The whole
          batch balances.
